<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b0e14">
  <link rel="apple-touch-icon" href="icon.png">
  <title>MI6 Intelligence Log</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>MI6 Classified Ledger</h1>
    </header>

    <div class="tab-container">
      <button id="btn-main" class="tab-btn active" onclick="switchTab('main')">Core Mission</button>
      <button id="btn-fancy" class="tab-btn" onclick="switchTab('fancy')">Phase Goals</button>
      <button id="btn-uplink" class="tab-btn" onclick="switchTab('uplink')">Sat-Uplink</button>
    </div>

    <!-- MAIN TAB -->
    <div id="mainTab" class="tab-content active">
      <!-- Core Mission content -->
      <!-- ... unchanged from your version ... -->
    </div>

    <!-- FANCY TAB -->
    <div id="fancyTab" class="tab-content">
      <!-- Phase Goals content -->
      <!-- ... unchanged from your version ... -->
    </div>

    <!-- UPLINK TAB -->
    <div id="uplinkTab" class="tab-content">
      <section class="card">
        <h3>Live Field Telemetry</h3>
        <div id="liveScoreBox" class="data-panel">> AWAITING UPLINK INITIATION...</div>
      </section>

      <section class="card ai-panel">
        <h3>MI6 Quantum Oracle (AI)</h3>
        <div id="aiPredictionBox" class="data-panel">> ORACLE ENGINE STANDBY...</div>
        <button class="btn-ai mt-2" onclick="establishUplink()">Establish Secure Uplink</button>
      </section>

      <section class="card">
        <h3>Recent Balls</h3>
        <div id="lastBallsBox" class="ball-history"></div>
      </section>

      <section class="card radar-box">
        <div class="radar-title">
          <span>Web Radar</span>
          <span class="radar-status">LIVE</span>
        </div>
        <div class="input-group">
          <input id="radarUrlInput" placeholder="Enter live exchange URL">
          <button id="radarLoadBtn">Load Radar</button>
        </div>
        <div id="radarFrameBox" style="width:100%;height:400px;"></div>
      </section>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
