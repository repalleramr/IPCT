<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPCT Final Fixed</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial;background:#0b1220;color:white;padding:10px}
input,select,button{padding:8px;margin:4px;border-radius:6px;border:none}
button{background:#2d7dff;color:white}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #444}
</style>
</head>
<body>

<h2>IPCT FINAL (Fixed Logic)</h2>

<select id="match"></select>
<select id="fav"></select>
<select id="winner"></select>

<select id="action">
<option>Eat</option>
<option>Play</option>
</select>

<input id="rate" type="number" placeholder="Rate %">
<input id="stake" type="number" placeholder="Stake">

<button onclick="add()">Add</button>
<button onclick="resetAll()">Reset</button>

<h3 id="total"></h3>

<table>
<tr>
<th>#</th><th>Match</th><th>Fav</th><th>Winner</th>
<th>Action</th><th>Rate</th><th>Stake</th>
<th>Result</th><th>Running</th>
</tr>
<tbody id="data"></tbody>
</table>

<script>
let matches = ["MI vs CSK","RCB vs KKR","GT vs DC"];
let bets = JSON.parse(localStorage.getItem("bets")||"[]");

function setup(){
match.innerHTML=matches.map(m=>`<option>${m}</option>`).join("");
fav.innerHTML="<option>Team A</option><option>Team B</option>";
winner.innerHTML=fav.innerHTML;
}
setup();

function calc(b){
let rate=b.rate/100;
let stake=b.stake;

let favWin = b.fav===b.winner;

if(b.action=="Eat"){
if(favWin){
return -stake*rate; // we pay %
}else{
return stake; // we win full
}
}else{
if(favWin){
return stake*rate; // we win %
}else{
return -stake; // we lose full
}
}
}

function add(){
let b={
match:match.value,
fav:fav.value,
winner:winner.value,
action:action.value,
rate:+rate.value,
stake:+stake.value
};

bets.push(b);
save();
}

function save(){
localStorage.setItem("bets",JSON.stringify(bets));
render();
}

function resetAll(){
localStorage.removeItem("bets");
bets=[];
render();
}

function render(){
let tb=data;
tb.innerHTML="";
let run=0;

bets.forEach((b,i)=>{
let n=calc(b);
run+=n;

tb.innerHTML+=`<tr>
<td>${i+1}</td>
<td>${b.match}</td>
<td>${b.fav}</td>
<td>${b.winner}</td>
<td>${b.action}</td>
<td>${b.rate}</td>
<td>${b.stake}</td>
<td>${n.toFixed(2)}</td>
<td>${run.toFixed(2)}</td>
</tr>`;
});

total.innerText="Running Total: "+run.toFixed(2);
}

render();
</script>

</body>
</html>
