<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPCT V2</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;padding:10px}
input,select,button{padding:8px;margin:4px;border-radius:6px;border:none}
button{background:#2d7dff;color:white}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #444}
</style>
</head>
<body>

<h2>IPCT V2 (Match Based Winner)</h2>

<h3>Add Entry</h3>
<select id="match"></select>
<select id="fav"></select>
<select id="action">
<option>Eat</option>
<option>Play</option>
</select>
<input id="rate" type="number" placeholder="Rate %">
<input id="stake" type="number" placeholder="Stake">
<button onclick="add()">Add Entry</button>

<h3>Set Match Winner</h3>
<select id="matchWinner"></select>
<select id="winner"></select>
<button onclick="setWinner()">Set Winner</button>

<h3 id="total"></h3>

<table>
<tr>
<th>#</th><th>Match</th><th>Fav</th><th>Action</th>
<th>Rate</th><th>Stake</th>
<th>Result</th><th>Net</th><th>Running</th>
</tr>
<tbody id="data"></tbody>
</table>

<script>
let matches = ["MI vs CSK","RCB vs KKR","GT vs DC"];
let winners = {}; // per match
let bets = JSON.parse(localStorage.getItem("bets_v2")||"[]");

function setup(){
match.innerHTML=matches.map(m=>`<option>${m}</option>`).join("");
matchWinner.innerHTML=match.innerHTML;
fav.innerHTML="<option>Team A</option><option>Team B</option>";
winner.innerHTML=fav.innerHTML;
}
setup();

function calc(b){
let rate=b.rate/100;
let stake=b.stake;
let winTeam=winners[b.match];

if(!winTeam) return {res:"Pending",net:0};

let favWin = b.fav===winTeam;

if(b.action=="Eat"){
if(favWin){
return {res:"Lose",net:-stake*rate};
}else{
return {res:"Win",net:stake};
}
}else{
if(favWin){
return {res:"Win",net:stake*rate};
}else{
return {res:"Lose",net:-stake};
}
}
}

function add(){
bets.push({
match:match.value,
fav:fav.value,
action:action.value,
rate:+rate.value,
stake:+stake.value
});
save();
}

function setWinner(){
winners[matchWinner.value]=winner.value;
save();
}

function save(){
localStorage.setItem("bets_v2",JSON.stringify(bets));
render();
}

function render(){
let tb=data;
tb.innerHTML="";
let run=0;

bets.forEach((b,i)=>{
let c=calc(b);
run+=c.net;

tb.innerHTML+=`<tr>
<td>${i+1}</td>
<td>${b.match}</td>
<td>${b.fav}</td>
<td>${b.action}</td>
<td>${b.rate}</td>
<td>${b.stake}</td>
<td>${c.res}</td>
<td>${c.net.toFixed(2)}</td>
<td>${run.toFixed(2)}</td>
</tr>`;
});

total.innerText="Running Total: "+run.toFixed(2);
}

render();
</script>

</body>
</html>
