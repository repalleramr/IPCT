<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPCT Full</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial;background:#0b1220;color:white;padding:10px}
input,select,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#2d7dff;color:white}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #444}
</style>
</head>
<body>

<h2>IPCT Tracker (Full)</h2>

<input id="match" placeholder="Match"><br>
<select id="type"><option>BACK</option><option>LAY</option></select>
<input id="odds" type="number" placeholder="Odds">
<input id="stake" type="number" placeholder="Stake">
<select id="result">
<option value="">Pending</option>
<option value="WIN">Win</option>
<option value="LOSS">Loss</option>
</select>

<br>
<button onclick="add()">Add Entry</button>

<h3 id="summary"></h3>

<table>
<thead>
<tr>
<th>Match</th><th>Type</th><th>Odds</th><th>Stake</th>
<th>Profit</th><th>Liability</th><th>Net</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
let bets = JSON.parse(localStorage.getItem("bets")||"[]");

function calc(type,o,s){
if(type=="BACK"){
return {p:(o-1)*s,l:s}
}else{
return {p:s,l:(o-1)*s}
}
}

function net(b){
if(!b.result)return 0;
if(b.result=="WIN") return b.p;
return -b.l;
}

function add(){
let m=document.getElementById("match").value;
let t=document.getElementById("type").value;
let o=parseFloat(document.getElementById("odds").value);
let s=parseFloat(document.getElementById("stake").value);
let r=document.getElementById("result").value;

let c=calc(t,o,s);

bets.push({...c,match:m,type:t,odds:o,stake:s,result:r});
localStorage.setItem("bets",JSON.stringify(bets));
render();
}

function render(){
let tb=document.getElementById("data");
tb.innerHTML="";
let total=0;

bets.forEach(b=>{
let n=net(b);
total+=n;

tb.innerHTML+=`<tr>
<td>${b.match}</td>
<td>${b.type}</td>
<td>${b.odds}</td>
<td>${b.stake}</td>
<td>${b.p.toFixed(2)}</td>
<td>${b.l.toFixed(2)}</td>
<td>${n.toFixed(2)}</td>
</tr>`;
});

document.getElementById("summary").innerText="Running Total P/L: "+total.toFixed(2);
}

render();
</script>

</body>
</html>
