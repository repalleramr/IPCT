<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Back/Lay Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>IPL Match Tracker</h1>
        </header>

        <section class="setup-section card">
            <h3>1. Match Setup</h3>
            <div class="input-group">
                <select id="matchSelect" onchange="loadSelectedMatch()">
                    <option value="">-- Select IPL Match --</option>
                </select>
            </div>
            <div class="input-group mt-2" style="display:none;" id="customTeams">
                <input type="text" id="team1" placeholder="Team 1 Name" oninput="updateTeamNames()">
                <input type="text" id="team2" placeholder="Team 2 Name" oninput="updateTeamNames()">
            </div>
            <div class="input-group mt-2">
                <label for="finalWinner">Final Match Winner:</label>
                <select id="finalWinner" onchange="calculateTable()">
                    <option value="">-- Select Winner Later --</option>
                </select>
            </div>
        </section>

        <section class="entry-section card">
            <h3>2. New Bet Entry</h3>
            <div class="input-grid">
                <div class="field">
                    <label>Favorite Team</label>
                    <select id="entryTeam" onchange="updateLivePreview()"></select>
                </div>
                <div class="field">
                    <label>Action</label>
                    <select id="entryAction" onchange="updateLivePreview()">
                        <option value="Play">Play (Back)</option>
                        <option value="Eat">Eat (Lay)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Rate (Paise)</label>
                    <input type="number" id="entryRate" placeholder="e.g. 91" oninput="updateLivePreview()">
                </div>
                <div class="field">
                    <label>Stake</label>
                    <input type="number" id="entryStake" placeholder="Amount" oninput="updateLivePreview()">
                </div>
            </div>
            
            <div class="live-preview" id="livePreviewBox">
                <p><strong>Instant Preview:</strong></p>
                <div class="preview-teams">
                    <span id="previewTeam1">Team 1: 0</span>
                    <span id="previewTeam2">Team 2: 0</span>
                </div>
            </div>

            <button id="addBetBtn" onclick="addBet()">Add Bet</button>
        </section>

        <section class="table-section card">
            <h3>3. Bet Ledger</h3>
            <div class="table-wrapper">
                <table id="betTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Team</th>
                            <th>Action</th>
                            <th>Rate</th>
                            <th>Stake</th>
                            <th>P/L (Fav Wins)</th>
                            <th>P/L (Fav Loses)</th>
                            <th>Final P/L</th>
                        </tr>
                    </thead>
                    <tbody id="betTableBody">
                    </tbody>
                </table>
            </div>
            <div class="totals-bar">
                <strong>Total Net Profit: </strong>
                <span id="totalNetProfit" class="neutral">0</span>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
